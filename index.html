<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shivani Mathur</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: black;
      overflow: hidden;
      cursor: pointer;
      box-sizing: border-box;
      padding: 1rem;
    }
    .gif-container {
      text-align: center;
      color: white;
      font-size: clamp(1.5rem, 8vw, 3rem);
      cursor: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1em;
    }
    img {
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      margin-top: 0.23em;
    }
    a {
      text-decoration: none;
      color: white;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      display: flex;
      align-items: center;
    }
    .fa-icon {
      margin-right: 0.5em;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" referrerpolicy="no-referrer" />
</head>
<body onclick="openLink()">
  <div class="gif-container" id="clickArea">
    <span>Shivani Mathur</span>
  </div>

  <img id="gif1" src="cover.GIF?v=2" alt="Pathways GIF">

  <div class="gif-container">
    <a href="portfolio/port.html">
      <i class="fas fa-arrow-right fa-icon"></i>
    </a>
  </div>

  <script>
    function openLink() {
      var link = document.querySelector("a").href;
      window.location.href = link;
    }
  </script>
</body>
</html>
